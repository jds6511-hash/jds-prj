<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>영상 장면 검색</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f5f6f8;
         height: 100vh; display: flex; flex-direction: column; }
  header { padding: 10px 16px; background: #fff; border-bottom: 1px solid #ddd;
           display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; margin-right: 8px; }
  #progress-wrap { flex: 1; display: none; align-items: center; gap: 8px; }
  #progress-bar { flex: 1; height: 10px; background: #e0e0e0; border-radius: 5px;
                  overflow: hidden; }
  #progress-fill { height: 100%; width: 0; background: #4a7cf7; transition: width .4s; }
  #progress-text { font-size: 13px; color: #555; white-space: nowrap; }
  #error-box { display: none; padding: 8px 16px; background: #fdecea; color: #b3261e;
               font-size: 13px; white-space: pre-wrap; }
  main { flex: 1; display: grid; grid-template-columns: 3fr 2fr; gap: 10px;
         padding: 10px; min-height: 0; }
  #left { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  #player { width: 100%; background: #000; border-radius: 8px; max-height: 55vh; }
  #chat { flex: 1; display: flex; flex-direction: column; background: #fff;
          border-radius: 8px; border: 1px solid #ddd; min-height: 0; }
  #chat-log { flex: 1; overflow-y: auto; padding: 12px; display: flex;
              flex-direction: column; gap: 8px; }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 14px; }
  .msg.user { align-self: flex-end; background: #4a7cf7; color: #fff; }
  .msg.bot { align-self: flex-start; background: #f0f1f4; }
  .card { border: 1px solid #d0d4dc; background: #fff; border-radius: 8px;
          padding: 8px 10px; margin-top: 6px; cursor: pointer; font-size: 13px; }
  .card:hover { border-color: #4a7cf7; }
  .card .time { font-weight: bold; color: #4a7cf7; }
  .card .cap { color: #666; margin-top: 2px; }
  .low-rel { background: #fff4e0; border: 1px solid #e8b34a; color: #7a5a00;
    border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; font-size: 13px; }
  #chat-form { display: flex; gap: 8px; padding: 10px; border-top: 1px solid #eee; }
  #chat-input { flex: 1; padding: 8px 10px; border: 1px solid #ccc;
                border-radius: 6px; font-size: 14px; }
  #chat-form button { padding: 8px 16px; border: 0; border-radius: 6px;
                      background: #4a7cf7; color: #fff; cursor: pointer; }
  #chat-form button:disabled { background: #aab6d8; }
  #segments { background: #fff; border-radius: 8px; border: 1px solid #ddd;
              overflow-y: auto; min-height: 0; }
  #segments .placeholder { padding: 16px; color: #999; font-size: 14px; }
  .seg { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
         font-size: 13px; }
  .seg:hover { background: #f4f7ff; }
  .seg.hit { background: #fff7d6; }
  .seg .t { font-weight: bold; color: #4a7cf7; margin-right: 6px; }
  .seg .cap { color: #777; margin-top: 2px; }
</style>
</head>
<body>
<header>
  <h1>영상 장면 검색</h1>
  <input type="file" id="file-input" accept=".mp4">
  <div id="progress-wrap">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <span id="progress-text"></span>
  </div>
</header>
<div id="error-box"></div>
<main>
  <div id="left">
    <video id="player" controls></video>
    <div id="chat">
      <div id="chat-log">
        <div class="msg bot">영상을 업로드하면 장면을 검색할 수 있어요.</div>
      </div>
      <form id="chat-form">
        <input id="chat-input" placeholder="예: 요리 재료를 준비하는 장면" disabled>
        <button id="chat-send" disabled>검색</button>
      </form>
    </div>
  </div>
  <div id="segments"><div class="placeholder">전사·장면설명이 여기에 표시됩니다.</div></div>
</main>
<script>
const $ = id => document.getElementById(id);
let videoId = null;
const STAGE_ORDER = ["m1", "m2", "m3", "m4"];
const STAGE_INFO = { m1: [10, "오디오 추출·세그먼트 분할 (M1)"],
                     m2: [30, "대표 프레임 선택 (M2)"],
                     m3: [60, "전사·장면설명 생성 (M3)"],
                     m4: [85, "임베딩 인덱싱 (M4)"] };

function fmt(sec) {
  sec = Math.floor(sec);
  return Math.floor(sec / 60) + ":" + String(sec % 60).padStart(2, "0");
}
function seek(sec) {
  const v = $("player");
  v.currentTime = sec;
  v.play();
}
function showError(text) {
  $("error-box").style.display = "block";
  $("error-box").textContent = text;
}
function esc(s) {
  return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

$("file-input").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  $("error-box").style.display = "none";
  const fd = new FormData();
  fd.append("file", file);
  try {
    const r = await fetch("/api/upload", { method: "POST", body: fd });
    const body = await r.json();
    if (!r.ok) { showError(body.detail); return; }
    videoId = body.video_id;
    $("progress-wrap").style.display = "flex";
    poll();
  } catch (err) {
    showError("업로드 실패 — 네트워크를 확인해 주세요");
  }
});

async function poll() {
  try {
    const r = await fetch(`/api/status/${videoId}`);
    const st = await r.json();
    if (st.stage === "error") {
      showError("인덱싱 실패\n" + st.detail);
      $("progress-wrap").style.display = "none";
      return;
    }
    if (st.stage === "done") {
      $("progress-fill").style.width = "100%";
      $("progress-text").textContent = "완료";
      setTimeout(() => { $("progress-wrap").style.display = "none"; }, 1500);
      onReady();
      return;
    }
    const [pct, label] = STAGE_INFO[st.stage] || [0, st.stage];
    let fillPct = pct;
    let text = label + "…";
    if (st.progress) {
      const idx = STAGE_ORDER.indexOf(st.stage);
      const prevPct = idx > 0 ? STAGE_INFO[STAGE_ORDER[idx - 1]][0] : 0;
      const ratio = st.progress.total > 0 ? st.progress.n / st.progress.total : 0;
      fillPct = prevPct + (pct - prevPct) * ratio;
      text = `${label}… ${st.progress.n}/${st.progress.total}`;
    }
    $("progress-fill").style.width = fillPct + "%";
    $("progress-text").textContent = text;
    setTimeout(poll, 1000);
  } catch (err) {
    setTimeout(poll, 1000);
  }
}

async function onReady() {
  $("chat-log").innerHTML = "";
  addMsg("bot", null, "인덱싱 완료! 찾고 싶은 장면을 설명해 보세요.");
  $("player").src = `/api/video/${videoId}`;
  const r = await fetch(`/api/segments/${videoId}`);
  const { segments } = await r.json();
  const box = $("segments");
  box.innerHTML = "";
  for (const s of segments) {
    const div = document.createElement("div");
    div.className = "seg";
    div.id = `seg-${s.idx}`;
    div.innerHTML = `<span class="t">${fmt(s.start)}</span>` +
      `<span>${esc(s.subtitle) || "(무발화)"}</span>` +
      `<div class="cap">${esc(s.caption)}</div>`;
    div.onclick = () => seek(s.start);
    box.appendChild(div);
  }
  $("chat-input").disabled = false;
  $("chat-send").disabled = false;
}

function addMsg(role, cards, text, lowRelevance) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  if (text) div.textContent = text;
  if (lowRelevance) {
    // 8-2 abstention 배너: 결과는 그대로 보여주고 경고만 덧붙인다(결과 은폐 금지)
    const warn = document.createElement("div");
    warn.className = "low-rel";
    warn.textContent = "⚠️ 이 영상에 관련 구간이 없을 수 있습니다";
    div.appendChild(warn);
  }
  if (cards) for (const c of cards) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<span class="time">${fmt(c.start)}~${fmt(c.end)}</span> ` +
      `<span>${esc(c.subtitle) || "(무발화)"}</span>` +
      `<div class="cap">${esc(c.caption)}</div>`;
    card.onclick = () => seek(c.start);
    div.appendChild(card);
  }
  $("chat-log").appendChild(div);
  $("chat-log").scrollTop = $("chat-log").scrollHeight;
}

$("chat-form").addEventListener("submit", async e => {
  e.preventDefault();
  const query = $("chat-input").value.trim();
  if (!query || !videoId) return;
  addMsg("user", null, query);
  $("chat-input").value = "";
  $("chat-send").disabled = true;
  try {
    const r = await fetch("/api/search", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ video_id: videoId, query })
    });
    const body = await r.json();
    if (!r.ok) { addMsg("bot", null, body.detail); return; }
    addMsg("bot", body.results, null, body.low_relevance);
    document.querySelectorAll(".seg.hit").forEach(el => el.classList.remove("hit"));
    body.results.forEach(c => $(`seg-${c.idx}`)?.classList.add("hit"));
    $(`seg-${body.results[0]?.idx}`)?.scrollIntoView({ block: "center" });
  } catch (err) {
    addMsg("bot", null, "검색 요청 실패 — 네트워크를 확인해 주세요");
  } finally {
    $("chat-send").disabled = false;
  }
});

async function restoreCurrent() {
  try {
    const r = await fetch("/api/current");
    const cur = await r.json();
    if (!cur.video_id) return;
    videoId = cur.video_id;
    if (cur.stage === "done") {
      onReady();
    } else {
      $("progress-wrap").style.display = "flex";
      poll();
    }
  } catch (err) {
    // 복원 실패 시 현재처럼 대기
  }
}
restoreCurrent();
</script>
</body>
</html>
